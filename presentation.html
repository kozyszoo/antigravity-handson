@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&amp;display=swap');


/* ===== カラーパレット（パステル調） ===== */
/* Blue: #a8d8ea / #6daad8, Pink: #f6c6ea / #e08ac0 */
/* Green: #c1e6c0 / #6bb86a, Orange: #ffe0ac / #e0a050 */
/* Lavender: #d5c6e0 / #9b82b5 */

/* ===== ベース ===== */
section {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 22px;
  line-height: 1.6;
  padding: 40px 60px;
  background: #efe8f6;
  color: #3a2e4a;
}

/* ===== 見出し ===== */
h1 { font-size: 38px; font-weight: 900; color: #4a3560; margin-bottom: 12px; }
h2 { font-size: 27px; font-weight: 700; color: #5a4575; margin-bottom: 8px; }
h3 { font-size: 20px; font-weight: 700; color: #6a5580; margin-bottom: 4px; }

/* ===== 背景バリエーション ===== */
section.lead      { background: #e3d8f2; }
section.bg-blue   { background: #efe8f6; }
section.bg-pink   { background: #efe8f6; }
section.bg-green  { background: #efe8f6; }
section.bg-orange { background: #efe8f6; }
section.bg-lav    { background: #efe8f6; }
section.bg-dark   { background: #efe8f6; color: #3a2e4a; }
section.bg-dark h1, section.bg-dark h2, section.bg-dark h3 { color: #4a3560; }

/* ===== カード ===== */
.card {
  border-radius: 12px;
  padding: 14px 18px;
  margin: 4px 0;
  box-shadow: 0 3px 12px rgba(90,70,120,0.08);
}
.card-blue   { background: rgba(168,216,234,0.28); border: 2px solid #a8d8ea; }
.card-pink   { background: rgba(246,198,234,0.28); border: 2px solid #f6c6ea; }
.card-green  { background: rgba(193,230,192,0.28); border: 2px solid #c1e6c0; }
.card-orange { background: rgba(255,224,172,0.28); border: 2px solid #ffe0ac; }
.card-lav    { background: rgba(213,198,224,0.28); border: 2px solid #d5c6e0; }

/* ===== レイアウト ===== */
.cols   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.center { text-align: center; }
.gap    { display: flex; flex-wrap: wrap; gap: 10px; }

/* ===== Material Symbols ===== */
.ms {
  font-family: 'Material Symbols Outlined';
  font-size: 38px;
  line-height: 1;
  vertical-align: middle;
}
.ms-sm   { font-size: 28px; }
.ms-lg   { font-size: 50px; }
.ms-xl   { font-size: 64px; }
.ms-hero { font-size: 96px; }

/* ===== アイコン色 ===== */
.c-blue   { color: #6daad8; }
.c-pink   { color: #e08ac0; }
.c-green  { color: #6bb86a; }
.c-orange { color: #e0a050; }
.c-lav    { color: #9b82b5; }
.c-white  { color: #ffffff; }

/* ===== ページ番号 ===== */
section::after { color: #9b82b5; font-size: 16px; }

/* ===== タイムバッジ ===== */
.time-badge {
  display: inline-block;
  background: #9b82b5;
  color: white;
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

/* ===== ステップバッジ ===== */
.step-badge {
  display: inline-block;
  border-radius: 8px;
  padding: 3px 12px;
  font-size: 16px;
  font-weight: 700;
  margin-right: 8px;
}
.step-blue   { background: #6daad8; color: white; }
.step-green  { background: #6bb86a; color: white; }
.step-orange { background: #e0a050; color: white; }
.step-lav    { background: #9b82b5; color: white; }

/* ===== コードブロック ===== */
code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(157,130,181,0.15);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.85em;
}
pre code {
  background: none;
  padding: 0;
}
pre {
  background: #2d2040;
  color: #e8d8ff;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 18px;
}

/* ===== カラーパレット（パステル調） ===== */
/* Blue: #a8d8ea / #6daad8, Pink: #f6c6ea / #e08ac0 */
/* Green: #c1e6c0 / #6bb86a, Orange: #ffe0ac / #e0a050 */
/* Lavender: #d5c6e0 / #9b82b5 */

/* ===== ベース ===== */
section {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 22px;
  line-height: 1.6;
  padding: 40px 60px;
  background: #efe8f6;
  color: #3a2e4a;
}

/* ===== 見出し ===== */
h1 { font-size: 38px; font-weight: 900; color: #4a3560; margin-bottom: 12px; }
h2 { font-size: 27px; font-weight: 700; color: #5a4575; margin-bottom: 8px; }
h3 { font-size: 20px; font-weight: 700; color: #6a5580; margin-bottom: 4px; }

/* ===== 背景バリエーション ===== */
section.lead      { background: #e3d8f2; }
section.bg-blue   { background: #efe8f6; }
section.bg-pink   { background: #efe8f6; }
section.bg-green  { background: #efe8f6; }
section.bg-orange { background: #efe8f6; }
section.bg-lav    { background: #efe8f6; }
section.bg-dark   { background: #efe8f6; color: #3a2e4a; }
section.bg-dark h1, section.bg-dark h2, section.bg-dark h3 { color: #4a3560; }

/* ===== カード ===== */
.card {
  border-radius: 12px;
  padding: 14px 18px;
  margin: 4px 0;
  box-shadow: 0 3px 12px rgba(90,70,120,0.08);
}
.card-blue   { background: rgba(168,216,234,0.28); border: 2px solid #a8d8ea; }
.card-pink   { background: rgba(246,198,234,0.28); border: 2px solid #f6c6ea; }
.card-green  { background: rgba(193,230,192,0.28); border: 2px solid #c1e6c0; }
.card-orange { background: rgba(255,224,172,0.28); border: 2px solid #ffe0ac; }
.card-lav    { background: rgba(213,198,224,0.28); border: 2px solid #d5c6e0; }

/* ===== レイアウト ===== */
.cols   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.center { text-align: center; }
.gap    { display: flex; flex-wrap: wrap; gap: 10px; }

/* ===== Material Symbols ===== */
.ms {
  font-family: 'Material Symbols Outlined';
  font-size: 38px;
  line-height: 1;
  vertical-align: middle;
}
.ms-sm   { font-size: 28px; }
.ms-lg   { font-size: 50px; }
.ms-xl   { font-size: 64px; }
.ms-hero { font-size: 96px; }

/* ===== アイコン色 ===== */
.c-blue   { color: #6daad8; }
.c-pink   { color: #e08ac0; }
.c-green  { color: #6bb86a; }
.c-orange { color: #e0a050; }
.c-lav    { color: #9b82b5; }
.c-white  { color: #ffffff; }

/* ===== ページ番号 ===== */
section::after { color: #9b82b5; font-size: 16px; }

/* ===== タイムバッジ ===== */
.time-badge {
  display: inline-block;
  background: #9b82b5;
  color: white;
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

/* ===== ステップバッジ ===== */
.step-badge {
  display: inline-block;
  border-radius: 8px;
  padding: 3px 12px;
  font-size: 16px;
  font-weight: 700;
  margin-right: 8px;
}
.step-blue   { background: #6daad8; color: white; }
.step-green  { background: #6bb86a; color: white; }
.step-orange { background: #e0a050; color: white; }
.step-lav    { background: #9b82b5; color: white; }

/* ===== コードブロック ===== */
code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(157,130,181,0.15);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.85em;
}
pre code {
  background: none;
  padding: 0;
}
pre {
  background: #2d2040;
  color: #e8d8ff;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 18px;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&amp;display=swap');


/* ===== カラーパレット（パステル調） ===== */
/* Blue: #a8d8ea / #6daad8, Pink: #f6c6ea / #e08ac0 */
/* Green: #c1e6c0 / #6bb86a, Orange: #ffe0ac / #e0a050 */
/* Lavender: #d5c6e0 / #9b82b5 */

/* ===== ベース ===== */
section {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 22px;
  line-height: 1.6;
  padding: 40px 60px;
  background: #efe8f6;
  color: #3a2e4a;
}

/* ===== 見出し ===== */
h1 { font-size: 38px; font-weight: 900; color: #4a3560; margin-bottom: 12px; }
h2 { font-size: 27px; font-weight: 700; color: #5a4575; margin-bottom: 8px; }
h3 { font-size: 20px; font-weight: 700; color: #6a5580; margin-bottom: 4px; }

/* ===== 背景バリエーション ===== */
section.lead      { background: #e3d8f2; }
section.bg-blue   { background: #efe8f6; }
section.bg-pink   { background: #efe8f6; }
section.bg-green  { background: #efe8f6; }
section.bg-orange { background: #efe8f6; }
section.bg-lav    { background: #efe8f6; }
section.bg-dark   { background: #efe8f6; color: #3a2e4a; }
section.bg-dark h1, section.bg-dark h2, section.bg-dark h3 { color: #4a3560; }

/* ===== カード ===== */
.card {
  border-radius: 12px;
  padding: 14px 18px;
  margin: 4px 0;
  box-shadow: 0 3px 12px rgba(90,70,120,0.08);
}
.card-blue   { background: rgba(168,216,234,0.28); border: 2px solid #a8d8ea; }
.card-pink   { background: rgba(246,198,234,0.28); border: 2px solid #f6c6ea; }
.card-green  { background: rgba(193,230,192,0.28); border: 2px solid #c1e6c0; }
.card-orange { background: rgba(255,224,172,0.28); border: 2px solid #ffe0ac; }
.card-lav    { background: rgba(213,198,224,0.28); border: 2px solid #d5c6e0; }

/* ===== レイアウト ===== */
.cols   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.center { text-align: center; }
.gap    { display: flex; flex-wrap: wrap; gap: 10px; }

/* ===== Material Symbols ===== */
.ms {
  font-family: 'Material Symbols Outlined';
  font-size: 38px;
  line-height: 1;
  vertical-align: middle;
}
.ms-sm   { font-size: 28px; }
.ms-lg   { font-size: 50px; }
.ms-xl   { font-size: 64px; }
.ms-hero { font-size: 96px; }

/* ===== アイコン色 ===== */
.c-blue   { color: #6daad8; }
.c-pink   { color: #e08ac0; }
.c-green  { color: #6bb86a; }
.c-orange { color: #e0a050; }
.c-lav    { color: #9b82b5; }
.c-white  { color: #ffffff; }

/* ===== ページ番号 ===== */
section::after { color: #9b82b5; font-size: 16px; }

/* ===== タイムバッジ ===== */
.time-badge {
  display: inline-block;
  background: #9b82b5;
  color: white;
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

/* ===== ステップバッジ ===== */
.step-badge {
  display: inline-block;
  border-radius: 8px;
  padding: 3px 12px;
  font-size: 16px;
  font-weight: 700;
  margin-right: 8px;
}
.step-blue   { background: #6daad8; color: white; }
.step-green  { background: #6bb86a; color: white; }
.step-orange { background: #e0a050; color: white; }
.step-lav    { background: #9b82b5; color: white; }

/* ===== コードブロック ===== */
code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(157,130,181,0.15);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.85em;
}
pre code {
  background: none;
  padding: 0;
}
pre {
  background: #2d2040;
  color: #e8d8ff;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 18px;
}
